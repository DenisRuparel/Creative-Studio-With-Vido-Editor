name: Creative Studio CI

on:
  push:
    branches:
      - master
      
env:
  REGISTRY: demo.goharbor.io
  PROJECT: creative-studio
  IMAGE_NAME: creative-studio
  PLUGIN_IMAGE_NAME: timoni-cmp

jobs:
# ─────────────────────────────────────────────
# 🔹 1. Build Timoni Plugin (only if changed)
# ─────────────────────────────────────────────
  build-plugin:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect plugin changes
        id: plugin-check
        run: |
          echo "Checking changes..."
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q 'argocd/plugin/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Plugin changed ✅"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Plugin unchanged ❌"
          fi

      - name: Login to Harbor
        if: steps.plugin-check.outputs.changed == 'true'
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login $REGISTRY \
            -u "${{ secrets.HARBOR_USERNAME }}" --password-stdin

      - name: Setup Docker Buildx
        if: steps.plugin-check.outputs.changed == 'true'
        run: docker buildx create --use || true

      - name: Build & Push Plugin Image (with cache 🚀)
        if: steps.plugin-check.outputs.changed == 'true'
        run: |
          docker buildx build \
            --push \
            -t $REGISTRY/$PROJECT/$PLUGIN_IMAGE_NAME:${GITHUB_SHA} \
            -t $REGISTRY/$PROJECT/$PLUGIN_IMAGE_NAME:cache \
            --cache-from=type=registry,ref=$REGISTRY/$PROJECT/$PLUGIN_IMAGE_NAME:cache \
            --cache-to=type=registry,ref=$REGISTRY/$PROJECT/$PLUGIN_IMAGE_NAME:cache,mode=max \
            -f argocd/plugin/Dockerfile \
            argocd/plugin

      - name: Get plugin image digest
        if: steps.plugin-check.outputs.changed == 'true'
        id: plugin-digest
        run: |
          DIGEST=$(docker buildx imagetools inspect \
            $REGISTRY/$PROJECT/$PLUGIN_IMAGE_NAME:${GITHUB_SHA} \
            --format '{{json .Manifest.Digest}}' | tr -d '"')

          echo "digest=$REGISTRY/$PROJECT/$PLUGIN_IMAGE_NAME@$DIGEST" >> $GITHUB_OUTPUT

      - name: Update ArgoCD repo-server patch
        if: steps.plugin-check.outputs.changed == 'true'
        run: |
          git clone https://x-access-token:${{ secrets.REPO_TOKEN }}@github.com/DenisRuparel/Timoni-implementation-with-ArgoCD-Plugin---DevOps.git
          cd Timoni-implementation-with-ArgoCD-Plugin---DevOps

          sed -i 's|image: demo.goharbor.io/creative-studio/timoni-cmp.*|image: '"${{ steps.plugin-digest.outputs.digest }}"'|' \
            argocd/plugin/repo-server-patch.yaml

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git commit -am "chore: update timoni plugin image" || echo "No changes"
          git push

# ─────────────────────────────────────────────
# 🔹 2. Build Application Image (FAST 🚀)
# ─────────────────────────────────────────────
  build-app:
    runs-on: self-hosted
    needs: build-plugin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Login to Harbor
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login $REGISTRY \
            -u "${{ secrets.HARBOR_USERNAME }}" --password-stdin

      - name: Enable Docker BuildKit
        run: echo "DOCKER_BUILDKIT=1" >> $GITHUB_ENV

      - name: Setup Docker Buildx
        run: docker buildx create --use || true

      - name: Build & Push App Image (with cache 🚀)
        run: |
          docker buildx build \
            --push \
            -t $REGISTRY/$PROJECT/$IMAGE_NAME:${IMAGE_TAG} \
            -t $REGISTRY/$PROJECT/$IMAGE_NAME:cache \
            --cache-from=type=registry,ref=$REGISTRY/$PROJECT/$IMAGE_NAME:cache \
            --cache-to=type=registry,ref=$REGISTRY/$PROJECT/$IMAGE_NAME:cache,mode=max \
            .

      - name: Get image digest
        id: image-digest
        run: |
          DIGEST=$(docker buildx imagetools inspect \
            $REGISTRY/$PROJECT/$IMAGE_NAME:${IMAGE_TAG} \
            --format '{{json .Manifest.Digest}}' | tr -d '"')

          echo "IMAGE_DIGEST=$REGISTRY/$PROJECT/$IMAGE_NAME@$DIGEST" >> $GITHUB_ENV

      - name: Trigger CD pipeline (ArgoCD GitOps)
        run: |
          curl -X POST \
          https://api.github.com/repos/DenisRuparel/Timoni-implementation-with-ArgoCD-Plugin---DevOps/dispatches \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.REPO_TOKEN }}" \
          -d '{
            "event_type": "update-image",
            "client_payload": {
              "image_digest": "'${IMAGE_DIGEST}'"
            }
          }'

name: Creative Studio CI

on:
  push:
    branches:
      - master
      
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true 

env:
  REGISTRY: demo.goharbor.io
  PROJECT: creative-studio
  IMAGE_NAME: creative-studio
  PLUGIN_IMAGE_NAME: timoni-cmp

jobs:
  # ────────────────────────────────────────────
  # Build plugin sidecar only if plugin/ changed
  # ────────────────────────────────────────────
  build-plugin:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if plugin/ changed
        id: plugin-check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^plugin/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Plugin folder changed — will build sidecar image"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Plugin folder unchanged — skipping sidecar build"
          fi

      - name: Login to Harbor
        if: steps.plugin-check.outputs.changed == 'true'
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login $REGISTRY \
            -u "${{ secrets.HARBOR_USERNAME }}" --password-stdin

      - name: Build plugin image
        if: steps.plugin-check.outputs.changed == 'true'
        run: |
          docker build -t $REGISTRY/$PROJECT/$PLUGIN_IMAGE_NAME:latest ./plugin

      - name: Push plugin image
        if: steps.plugin-check.outputs.changed == 'true'
        run: |
          docker push $REGISTRY/$PROJECT/$PLUGIN_IMAGE_NAME:latest
          echo "Plugin image pushed: $REGISTRY/$PROJECT/$PLUGIN_IMAGE_NAME:latest"

  # ─────────────────────────────────────────
  # Build app image
  # ─────────────────────────────────────────
  
  build-app:
    runs-on: self-hosted
    needs: build-plugin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Login to Harbor
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login $REGISTRY \
            -u "${{ secrets.HARBOR_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t $REGISTRY/$PROJECT/$IMAGE_NAME:${IMAGE_TAG} .

      - name: Push Docker image
        run: |
          docker push $REGISTRY/$PROJECT/$IMAGE_NAME:${IMAGE_TAG}

      - name: Get image digest
        run: |
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
            $REGISTRY/$PROJECT/$IMAGE_NAME:${IMAGE_TAG} | cut -d'@' -f2)
          echo "IMAGE_DIGEST=$DIGEST" >> $GITHUB_ENV
          echo "Digest is $DIGEST"

      - name: Trigger CD pipeline
        run: |
          curl -X POST \
          https://api.github.com/repos/DenisRuparel/Timoni-implementation-with-ArgoCD-Plugin---DevOps/dispatches \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.REPO_TOKEN }}" \
          -d '{
            "event_type": "update-image",
            "client_payload": {
              "image_digest": "'${IMAGE_DIGEST}'"
            }
          }'

name: Creative Studio CI

on:
  push:
    branches:
      - master

env:
  REGISTRY: demo.goharbor.io
  PROJECT: creative-studio
  IMAGE_NAME: creative-studio
  PLUGIN_IMAGE_NAME: timoni-cmp

jobs:
  # ───────────────────────────────────────────────────
  # Build plugin sidecar ONLY if argocd/plugin/ changed
  # ───────────────────────────────────────────────────
  build-plugin:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if plugin changed
        id: plugin-check
        run: |
          echo "Changed files:"
          git diff --name-only ${{ github.event.before }} ${{ github.sha }}

          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q 'argocd/plugin/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Plugin changed ✅"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Plugin NOT changed ❌"
          fi

      - name: Login to Harbor
        if: steps.plugin-check.outputs.changed == 'true'
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login $REGISTRY \
            -u "${{ secrets.HARBOR_USERNAME }}" --password-stdin

      - name: Build plugin image
        if: steps.plugin-check.outputs.changed == 'true'
        run: |
          docker pull $REGISTRY/$PROJECT/$PLUGIN_IMAGE_NAME:cache || true
          docker build \
            --cache-from=$REGISTRY/$PROJECT/$PLUGIN_IMAGE_NAME:cache \
            -t $REGISTRY/$PROJECT/$PLUGIN_IMAGE_NAME:${GITHUB_SHA} \
            -t $REGISTRY/$PROJECT/$PLUGIN_IMAGE_NAME:cache \
            -f argocd/plugin/Dockerfile \
            argocd/plugin

      - name: Push plugin image
        if: steps.plugin-check.outputs.changed == 'true'
        run: |
          docker push $REGISTRY/$PROJECT/$PLUGIN_IMAGE_NAME:${GITHUB_SHA}
          docker push $REGISTRY/$PROJECT/$PLUGIN_IMAGE_NAME:cache

      - name: Get plugin digest
        if: steps.plugin-check.outputs.changed == 'true'
        id: plugin-digest
        run: |
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
            $REGISTRY/$PROJECT/$PLUGIN_IMAGE_NAME:${GITHUB_SHA})
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Update ArgoCD repo-server patch
        if: steps.plugin-check.outputs.changed == 'true'
        run: |
          git clone https://x-access-token:${{ secrets.REPO_TOKEN }}@github.com/DenisRuparel/Timoni-implementation-with-ArgoCD-Plugin---DevOps.git
          cd Timoni-implementation-with-ArgoCD-Plugin---DevOps

          sed -i 's|image: demo.goharbor.io/creative-studio/timoni-cmp.*|image: '"${{ steps.plugin-digest.outputs.digest }}"'|' \
            argocd/plugin/repo-server-patch.yaml

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git commit -am "chore: update timoni plugin image" || echo "No changes"
          git push

  # ────────────────────────────────────────
  # Build app image (OPTIMIZED)
  # ────────────────────────────────────────
  build-app:
    runs-on: self-hosted
    needs: build-plugin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Login to Harbor
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login $REGISTRY \
            -u "${{ secrets.HARBOR_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker pull $REGISTRY/$PROJECT/$IMAGE_NAME:cache || true      
          docker build \
            --cache-from=$REGISTRY/$PROJECT/$IMAGE_NAME:cache \
            -t $REGISTRY/$PROJECT/$IMAGE_NAME:${IMAGE_TAG} \
            -t $REGISTRY/$PROJECT/$IMAGE_NAME:cache \
            .

      - name: Push Docker image
        run: |
          docker push $REGISTRY/$PROJECT/$IMAGE_NAME:${IMAGE_TAG}
          docker push $REGISTRY/$PROJECT/$IMAGE_NAME:cache

      - name: Get image digest
        run: |
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
            $REGISTRY/$PROJECT/$IMAGE_NAME:${IMAGE_TAG})
          echo "IMAGE_DIGEST=$DIGEST" >> $GITHUB_ENV

      - name: Trigger CD pipeline
        run: |
          curl -X POST \
          https://api.github.com/repos/DenisRuparel/Timoni-implementation-with-ArgoCD-Plugin---DevOps/dispatches \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.REPO_TOKEN }}" \
          -d '{
            "event_type": "update-image",
            "client_payload": {
              "image_digest": "'${IMAGE_DIGEST}'"
            }
          }'

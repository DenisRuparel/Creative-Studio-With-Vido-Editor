name: Creative Studio CI

on:
  push:
    branches: master
  
env:
  REGISTRY: 13.233.247.153
  PROJECT: creative-studio
  IMAGE_NAME: creative-studio
  
permissions:
  contents: write

jobs:
  build-app:
    name: Build application image and trigger CD
    runs-on: self-hosted
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Harbor
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login "${REGISTRY}" \
            -u "${{ secrets.HARBOR_USERNAME }}" --password-stdin

      - name: Build app image
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            -t "${REGISTRY}/${PROJECT}/${IMAGE_NAME}:${GITHUB_SHA}" \
            -t "${REGISTRY}/${PROJECT}/${IMAGE_NAME}:latest" \
            .

      - name: Push app image
        shell: bash
        run: |
          set -euo pipefail
          docker push "${REGISTRY}/${PROJECT}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker push "${REGISTRY}/${PROJECT}/${IMAGE_NAME}:latest"

      - name: Get app image digest
        id: image-digest
        shell: bash
        run: |
          set -euo pipefail
          docker pull "${REGISTRY}/${PROJECT}/${IMAGE_NAME}:${GITHUB_SHA}" >/dev/null
          DIGEST_REF="$(docker image inspect "${REGISTRY}/${PROJECT}/${IMAGE_NAME}:${GITHUB_SHA}" --format '{{index .RepoDigests 0}}')"
          echo "image_digest=${DIGEST_REF}" >> "$GITHUB_OUTPUT"
          echo "App digest: ${DIGEST_REF}"

      - name: Trigger CD pipeline (repository_dispatch)
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL -X POST \
            "https://api.github.com/repos/DenisRuparel/Timoni-implementation-with-ArgoCD-Plugin---DevOps/dispatches" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.REPO_TOKEN }}" \
            -d '{
              "event_type": "update-image",
              "client_payload": {
                "image_digest": "'"${{ steps.image-digest.outputs.image_digest }}"'",
                "registry": "'"${{ env.REGISTRY }}"'"
              }
            }'
